# CI workflow: lint, test, integration-test, security
#
# Status badge (use in README):
#   [![CI](https://github.com/OWNER/REPO/actions/workflows/ci.yml/badge.svg)](https://github.com/OWNER/REPO/actions/workflows/ci.yml)
# Replace OWNER/REPO with your GitHub org/repo.
#
# Branch protection recommendation:
#   - Require status checks: lint, test, security (and optionally integration-test for main)
#   - Require branches to be up to date before merging
#   - Require pull request reviews before merging (optional)

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy src/

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit tests with coverage
        env:
          COVERAGE_FILE: .coverage-data/.coverage.${{ matrix.python-version }}
        run: |
          mkdir -p test-results .coverage-data
          uv run pytest tests/unit -v --tb=short \
            --cov=src/ai_team --cov-report=xml --cov-report=term \
            --junitxml=test-results/unit.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-unit-${{ matrix.python-version }}
          path: test-results/

  web-e2e:
    name: Web UI E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/ai_team/ui/web/frontend/package-lock.json

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install Playwright Chromium
        run: uv run playwright install chromium

      - name: Build frontend
        working-directory: src/ai_team/ui/web/frontend
        run: npm ci && npm run build

      - name: Run web E2E (demo/mock — no LLM)
        run: uv run pytest tests/e2e/web -m web_e2e -v --tb=short --timeout=120

  integration-test:
    name: Integration test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run integration tests
        run: |
          mkdir -p test-results
          uv run pytest tests/integration -v --tb=short --junitxml=test-results/integration.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-integration
          path: test-results/

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install bandit (pip-audit is a project dev dependency)
        run: uv run pip install bandit

      - name: Upgrade pip (audit tooling CVEs)
        run: uv run python -m pip install --upgrade "pip>=26.1.2"

      - name: Bandit security scan
        run: uv run bandit -r src/ -f json -o bandit-report.json || true
        continue-on-error: true

      # litellm is pinned at 1.74.9 for CrewAI/Pydantic compatibility (see pyproject.toml).
      # uv/pyjwt/langchain-community advisories are transitive via crewai until upstream resolves.
      # starlette 1.0.1+ requires fastapi to lift starlette<1.0.0 (see fastapi pin).
      # chromadb/msgpack advisories: transitive; no fix on current chromadb pin (<1.2).
      - name: Pip-audit dependency vulnerabilities
        run: ./scripts/pip_audit.sh

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
