<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="580" fill="#ffffff"/>

  <text x="40" y="42" font-size="24" font-weight="700" fill="#111827">LangGraph — shared graph state channels</text>
  <text x="40" y="68" font-size="14" fill="#6b7280">TypedDict state flows through nodes; reducers merge each node's dict of updates</text>

  <rect x="60" y="96" width="120" height="46" rx="8" fill="#ccfbf1" stroke="#14b8a6"/>
  <text x="120" y="124" text-anchor="middle" font-size="15" font-weight="600" fill="#134e4a">intake</text>
  <rect x="220" y="96" width="140" height="46" rx="8" fill="#ccfbf1" stroke="#14b8a6"/>
  <text x="290" y="124" text-anchor="middle" font-size="15" font-weight="600" fill="#134e4a">planning</text>
  <line x1="180" y1="119" x2="218" y2="119" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- planning subgraph -->
  <rect x="200" y="182" width="500" height="150" rx="10" fill="none" stroke="#14b8a6" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="450" y="206" text-anchor="middle" font-size="13" font-weight="600" fill="#0f766e">planning subgraph — langgraph-supervisor</text>
  <rect x="360" y="218" width="180" height="50" rx="8" fill="#ccfbf1" stroke="#14b8a6"/>
  <text x="450" y="240" text-anchor="middle" font-size="15" font-weight="600" fill="#134e4a">Supervisor</text>
  <text x="450" y="258" text-anchor="middle" font-size="12" fill="#0d9488">manager</text>
  <rect x="230" y="286" width="190" height="40" rx="8" fill="#ccfbf1" stroke="#14b8a6"/>
  <text x="325" y="311" text-anchor="middle" font-size="14" font-weight="600" fill="#134e4a">product_owner · ReAct</text>
  <rect x="480" y="286" width="190" height="40" rx="8" fill="#ccfbf1" stroke="#14b8a6"/>
  <text x="575" y="311" text-anchor="middle" font-size="14" font-weight="600" fill="#134e4a">architect · ReAct</text>
  <line x1="415" y1="268" x2="360" y2="284" stroke="#14b8a6" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="485" y1="268" x2="540" y2="284" stroke="#14b8a6" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="290" y1="142" x2="400" y2="216" stroke="#14b8a6" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- human review -->
  <rect x="720" y="218" width="130" height="56" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="785" y="242" text-anchor="middle" font-size="14" font-weight="600" fill="#92400e">human_review</text>
  <text x="785" y="260" text-anchor="middle" font-size="12" fill="#a16207">interrupt()</text>
  <line x1="670" y1="242" x2="718" y2="244" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <text x="694" y="232" text-anchor="middle" font-size="11" fill="#a16207">clarify</text>

  <rect x="360" y="360" width="180" height="46" rx="8" fill="#ccfbf1" stroke="#14b8a6"/>
  <text x="450" y="388" text-anchor="middle" font-size="15" font-weight="600" fill="#134e4a">development</text>
  <line x1="450" y1="332" x2="450" y2="358" stroke="#14b8a6" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="120" y="440" width="120" height="46" rx="8" fill="#ccfbf1" stroke="#14b8a6"/>
  <text x="180" y="468" text-anchor="middle" font-size="15" font-weight="600" fill="#134e4a">testing</text>
  <rect x="270" y="440" width="110" height="46" rx="8" fill="#ccfbf1" stroke="#14b8a6"/>
  <text x="325" y="468" text-anchor="middle" font-size="15" font-weight="600" fill="#134e4a">smoke</text>
  <rect x="410" y="440" width="140" height="46" rx="8" fill="#ccfbf1" stroke="#14b8a6"/>
  <text x="480" y="468" text-anchor="middle" font-size="15" font-weight="600" fill="#134e4a">deployment</text>
  <rect x="580" y="440" width="100" height="46" rx="8" fill="#f3f4f6" stroke="#9ca3af"/>
  <text x="630" y="468" text-anchor="middle" font-size="15" font-weight="600" fill="#374151">END</text>
  <line x1="380" y1="406" x2="210" y2="438" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="240" y1="463" x2="268" y2="463" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="380" y1="463" x2="408" y2="463" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="550" y1="463" x2="578" y2="463" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>
  <path d="M180 440 L180 424 L450 424 L450 408" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <text x="230" y="419" font-size="11" fill="#a16207">retry</text>

  <rect x="60" y="512" width="780" height="44" rx="8" fill="#f0fdfa" stroke="#5eead4"/>
  <text x="80" y="539" font-size="13.5" font-weight="600" fill="#0f766e">Key idea: agents communicate through shared state channels; only the new message delta merges back.</text>

  <defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
