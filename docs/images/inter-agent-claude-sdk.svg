<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="560" fill="#ffffff"/>

  <text x="40" y="42" font-size="24" font-weight="700" fill="#111827">Claude Agent SDK — session + filesystem</text>
  <text x="40" y="68" font-size="14" fill="#6b7280">No typed state object; one query() session, nested subagents, workspace files carry phase handoff</text>

  <rect x="350" y="92" width="200" height="52" rx="8" fill="#f3f4f6" stroke="#9ca3af"/>
  <text x="450" y="116" text-anchor="middle" font-size="15" font-weight="600" fill="#374151">query() session</text>
  <text x="450" y="134" text-anchor="middle" font-size="12.5" fill="#6b7280">orchestrator = manager</text>

  <!-- planning-agent nested -->
  <rect x="60" y="188" width="220" height="170" rx="10" fill="none" stroke="#f97316" stroke-width="1" stroke-dasharray="5 4"/>
  <rect x="85" y="200" width="170" height="44" rx="8" fill="#ffedd5" stroke="#f97316"/>
  <text x="170" y="227" text-anchor="middle" font-size="14" font-weight="600" fill="#7c2d12">planning-agent</text>
  <rect x="85" y="262" width="170" height="38" rx="8" fill="#fff7ed" stroke="#fdba74"/>
  <text x="170" y="286" text-anchor="middle" font-size="13.5" fill="#9a3412">product-owner</text>
  <rect x="85" y="308" width="170" height="38" rx="8" fill="#fff7ed" stroke="#fdba74"/>
  <text x="170" y="332" text-anchor="middle" font-size="13.5" fill="#9a3412">architect</text>
  <line x1="170" y1="244" x2="170" y2="260" stroke="#f97316" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- development-agent nested -->
  <rect x="300" y="188" width="220" height="170" rx="10" fill="none" stroke="#f97316" stroke-width="1" stroke-dasharray="5 4"/>
  <rect x="325" y="200" width="170" height="44" rx="8" fill="#ffedd5" stroke="#f97316"/>
  <text x="410" y="227" text-anchor="middle" font-size="14" font-weight="600" fill="#7c2d12">development-agent</text>
  <rect x="325" y="262" width="170" height="38" rx="8" fill="#fff7ed" stroke="#fdba74"/>
  <text x="410" y="286" text-anchor="middle" font-size="13.5" fill="#9a3412">backend-developer</text>
  <rect x="325" y="308" width="170" height="38" rx="8" fill="#fff7ed" stroke="#fdba74"/>
  <text x="410" y="332" text-anchor="middle" font-size="13.5" fill="#9a3412">frontend-developer</text>
  <line x1="410" y1="244" x2="410" y2="260" stroke="#f97316" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- testing-agent -->
  <rect x="620" y="200" width="180" height="52" rx="8" fill="#ffedd5" stroke="#f97316"/>
  <text x="710" y="224" text-anchor="middle" font-size="14" font-weight="600" fill="#7c2d12">testing-agent</text>
  <text x="710" y="242" text-anchor="middle" font-size="12" fill="#c2410c">writes tests/</text>

  <line x1="390" y1="144" x2="200" y2="186" stroke="#f97316" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="270" y="168" font-size="11.5" fill="#c2410c">Agent tool</text>
  <line x1="440" y1="144" x2="420" y2="186" stroke="#f97316" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="510" y1="144" x2="690" y2="198" stroke="#f97316" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="330" y="400" width="240" height="52" rx="8" fill="#f3f4f6" stroke="#9ca3af"/>
  <text x="450" y="424" text-anchor="middle" font-size="15" font-weight="600" fill="#374151">Workspace files</text>
  <text x="450" y="442" text-anchor="middle" font-size="12.5" fill="#6b7280">docs / src / tests / logs</text>
  <line x1="170" y1="358" x2="330" y2="408" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="210" y="386" font-size="11.5" fill="#6b7280">writes docs/</text>
  <line x1="410" y1="358" x2="440" y2="398" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="710" y1="252" x2="570" y2="408" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>
  <path d="M330 428 L160 428 L160 116 L348 116" fill="none" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="60" y="290" font-size="11.5" fill="#6b7280">next agent reads</text>

  <!-- hooks -->
  <rect x="620" y="400" width="180" height="52" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="710" y="424" text-anchor="middle" font-size="14" font-weight="600" fill="#92400e">Hooks</text>
  <text x="710" y="442" text-anchor="middle" font-size="12" fill="#a16207">Pre/Post + subagent audit</text>
  <line x1="620" y1="430" x2="572" y2="428" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <text x="596" y="470" text-anchor="middle" font-size="11" fill="#a16207">enforce</text>

  <rect x="60" y="500" width="780" height="44" rx="8" fill="#fff7ed" stroke="#fdba74"/>
  <text x="80" y="527" font-size="13.5" font-weight="600" fill="#9a3412">Key idea: agents communicate through the session transcript plus files on disk. Guardrails enforced by hooks.</text>

  <defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
