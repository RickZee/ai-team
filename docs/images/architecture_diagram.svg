  <rect x="266" y="278" width="108" height="36" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.2"/>
  <text x="320" y="295" text-anchor="middle" fill="#94a3b8" font-size="9.5" font-weight="600">Architect</text>
  <text x="320" y="308" text-anchor="middle" fill="#64748b" font-size="8">System design</text>

  <!-- Row 2 -->
  <rect x="30" y="324" width="108" height="36" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.2"/>
  <text x="84" y="341" text-anchor="middle" fill="#94a3b8" font-size="9.5" font-weight="600">Backend Dev</text>
  <text x="84" y="354" text-anchor="middle" fill="#64748b" font-size="8">APIs · services</text>

  <rect x="148" y="324" width="108" height="36" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.2"/>
  <text x="202" y="341" text-anchor="middle" fill="#94a3b8" font-size="9.5" font-weight="600">Frontend Dev</text>
  <text x="202" y="354" text-anchor="middle" fill="#64748b" font-size="8">UI · components</text>

  <rect x="266" y="324" width="108" height="36" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.2"/>
  <text x="320" y="341" text-anchor="middle" fill="#94a3b8" font-size="9.5" font-weight="600">Fullstack Dev</text>
  <text x="320" y="354" text-anchor="middle" fill="#64748b" font-size="8">End-to-end</text>

  <!-- Row 3 -->
  <rect x="30" y="370" width="108" height="36" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.2"/>
  <text x="84" y="387" text-anchor="middle" fill="#94a3b8" font-size="9.5" font-weight="600">QA Engineer</text>
  <text x="84" y="400" text-anchor="middle" fill="#64748b" font-size="8">Tests · coverage</text>

  <rect x="148" y="370" width="108" height="36" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.2"/>
