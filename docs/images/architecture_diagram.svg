  <line x1="375" y1="102" x2="415" y2="102" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="375" y1="156" x2="415" y2="156" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr-p)"/>
  <line x1="375" y1="210" x2="415" y2="210" stroke="#d97706" stroke-width="1.5" marker-end="url(#arr-o)"/>

