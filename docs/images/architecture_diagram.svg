  <line x1="630" y1="126" x2="642" y2="126" stroke="#9ca3af" stroke-width="1.2" marker-end="url(#a)"/>
  <rect x="642" y="106" width="70" height="40" rx="6" fill="#f3f4f6" stroke="#9ca3af"/>
  <text x="677" y="123" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Dev</text>
