  <rect x="40" y="610" width="820" height="28" rx="3" fill="#fff7ed"/>
  <rect x="40" y="610" width="4" height="28" fill="#f97316"/>
  <text x="130" y="628" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412">Claude Agent SDK</text>
