  <rect x="266" y="370" width="108" height="36" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.2"/>
  <text x="320" y="387" text-anchor="middle" fill="#94a3b8" font-size="9.5" font-weight="600">Cloud Engineer</text>
