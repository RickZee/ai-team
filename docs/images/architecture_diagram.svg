  <text x="317" y="176" text-anchor="middle" font-size="13" font-weight="600" fill="#0f766e">LangGraph</text>
  <text x="317" y="192" text-anchor="middle" font-size="10.5" fill="#0d9488">StateGraph · streaming</text>
  <rect x="242" y="210" width="150" height="44" rx="8" fill="#ffedd5" stroke="#f97316"/>
  <text x="317" y="228" text-anchor="middle" font-size="13" font-weight="600" fill="#9a3412">Claude Agent SDK</text>
  <text x="317" y="244" text-anchor="middle" font-size="10.5" fill="#c2410c">Subagents · Anthropic</text>
  <line x1="392" y1="128" x2="424" y2="128" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="392" y1="180" x2="424" y2="180" stroke="#14b8a6" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="392" y1="232" x2="424" y2="232" stroke="#f97316" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="424" y1="128" x2="424" y2="232" stroke="#d1d5db" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="424" y1="180" x2="452" y2="180" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>

