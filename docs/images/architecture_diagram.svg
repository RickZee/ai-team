<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 660" role="img" font-family="Helvetica, Arial, sans-serif">
  <title>ai-team architecture: multi-backend agent pipeline</title>
  <desc>System diagram of the ai-team architecture: three supported backends (CrewAI, LangGraph, Claude Agent SDK), nine specialized agents, four guardrail layers, a self-improvement loop, and the 2026-07-04 n=5 smoke-test variance results.</desc>

  <rect width="900" height="660" fill="#ffffff"/>

  <text x="40" y="40" font-size="24" font-weight="700" fill="#111827">ai-team — multi-backend agent architecture</text>
  <text x="40" y="64" font-size="14" fill="#6b7280">Three backends, one agent team, file-based phase handoff</text>

  <!-- INPUT -->
  <text x="40" y="98" font-size="11" font-weight="700" fill="#6b7280" letter-spacing="1">INPUT</text>
  <rect x="40" y="106" width="160" height="48" rx="8" fill="#f3f4f6" stroke="#9ca3af"/>
  <text x="120" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Project description</text>
  <text x="120" y="145" text-anchor="middle" font-size="11" fill="#6b7280">"Build a Flask REST API"</text>
  <line x1="200" y1="130" x2="234" y2="130" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- BACKEND -->
  <text x="242" y="98" font-size="11" font-weight="700" fill="#6b7280" letter-spacing="1">BACKEND (--backend)</text>
