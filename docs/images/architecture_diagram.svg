    <rect x="160" y="402" width="112" height="40" rx="6" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="216" y="420" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">DevOps</text>
    <text x="216" y="435" text-anchor="middle" font-size="10" fill="#6b7280">CI/CD · Docker</text>
    <rect x="280" y="402" width="112" height="40" rx="6" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="336" y="420" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Cloud Engineer</text>
    <text x="336" y="435" text-anchor="middle" font-size="10" fill="#6b7280">Infra · IaC</text>
  </g>

