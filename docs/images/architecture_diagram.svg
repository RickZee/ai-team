  <text x="590" y="270" fill="#64748b" font-size="10" font-weight="600" letter-spacing="1.2">SELF-IMPROVEMENT LOOP</text>

  <rect x="590" y="278" width="250" height="130" rx="8" fill="#0f1117" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>

  <circle cx="610" cy="303" r="4" fill="#dc2626"/>
  <text x="622" y="307" fill="#f87171" font-size="9.5" font-weight="600">Failure captured → SQLite</text>

  <line x1="610" y1="307" x2="610" y2="323" stroke="#dc2626" stroke-width="1" stroke-dasharray="2,2" marker-end="url(#arr-r)"/>
  <circle cx="610" cy="330" r="4" fill="#d97706"/>
  <text x="622" y="334" fill="#fbbf24" font-size="9.5" font-weight="600">Pattern clustering</text>

  <line x1="610" y1="334" x2="610" y2="350" stroke="#d97706" stroke-width="1" stroke-dasharray="2,2" marker-end="url(#arr-o2)"/>
  <circle cx="610" cy="357" r="4" fill="#6366f1"/>
  <text x="622" y="361" fill="#a5b4fc" font-size="9.5" font-weight="600">Lessons extracted → ChromaDB</text>

  <line x1="610" y1="361" x2="610" y2="377" stroke="#6366f1" stroke-width="1" stroke-dasharray="2,2" marker-end="url(#arr-p2)"/>
  <circle cx="610" cy="384" r="4" fill="#16a34a"/>
  <text x="622" y="388" fill="#4ade80" font-size="9.5" font-weight="600">Injected into prompts next run</text>

