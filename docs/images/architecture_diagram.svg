  <rect x="785" y="80" width="60" height="36" rx="6" fill="#1a0a0a" stroke="#dc2626" stroke-width="1.2"/>
  <text x="815" y="95" text-anchor="middle" fill="#f87171" font-size="9.5" font-weight="700">DEPLOY</text>
  <text x="815" y="109" text-anchor="middle" fill="#fca5a5" font-size="8">DevOps · Cloud</text>

