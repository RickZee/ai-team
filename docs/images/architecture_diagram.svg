  <text x="600" y="514" text-anchor="middle" fill="#64748b" font-size="9">Most reliable · fastest · explicit StateGraph</text>

  <!-- Claude SDK row -->
  <rect x="30" y="524" width="800" height="28" rx="3" fill="#1a130a"/>
  <rect x="30" y="524" width="4" height="28" rx="2" fill="#d97706"/>
  <text x="100" y="542" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">Claude Agent SDK</text>
  <rect x="240" y="529" width="58" height="16" rx="8" fill="#16a34a"/>
  <text x="269" y="541" text-anchor="middle" fill="white" font-size="8.5" font-weight="700">PASSED</text>
  <text x="400" y="542" text-anchor="middle" fill="#fde68a" font-size="10">~200s</text>
