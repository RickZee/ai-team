  <text x="40" y="522" font-size="11" font-weight="700" fill="#6b7280" letter-spacing="1">BENCHMARK — n=5 SMOKE VARIANCE (add(a,b) + pytest · 2026-07-04)</text>
  <rect x="40" y="530" width="820" height="24" rx="4" fill="#f3f4f6"/>
  <text x="130" y="546" text-anchor="middle" font-size="11" font-weight="700" fill="#6b7280">BACKEND</text>
  <text x="330" y="546" text-anchor="middle" font-size="11" font-weight="700" fill="#6b7280">GREEN</text>
  <text x="460" y="546" text-anchor="middle" font-size="11" font-weight="700" fill="#6b7280">MEDIAN</text>
  <text x="640" y="546" text-anchor="middle" font-size="11" font-weight="700" fill="#6b7280">NOTES</text>

  <rect x="40" y="554" width="820" height="28" rx="3" fill="#fdf4ff"/>
  <rect x="40" y="554" width="4" height="28" fill="#8b5cf6"/>
  <text x="130" y="572" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">CrewAI</text>
  <rect x="300" y="559" width="60" height="16" rx="8" fill="#22c55e"/>
