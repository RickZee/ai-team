<svg viewBox="0 0 860 644" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, sans-serif">
  <title>ai-team Architecture: Multi-Backend Agent Pipeline</title>
  <desc>System diagram showing the ai-team architecture: three backends (LangGraph and Claude Agent SDK supported, CrewAI demoted to comparison-only), nine specialized agents, security/behavioral/quality/operational guardrail layers, a self-improvement loop, and 2026-06-30 smoke-test benchmark results.</desc>

  <!-- Background -->
  <rect width="860" height="644" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="430" y="38" text-anchor="middle" fill="#e2e8f0" font-size="17" font-weight="700" letter-spacing="0.3">ai-team: Multi-Backend Agent Architecture</text>

  <!-- INPUT label -->
  <text x="60" y="74" fill="#64748b" font-size="10" font-weight="600" letter-spacing="1.2">INPUT</text>

  <!-- User box -->
  <rect x="30" y="80" width="160" height="46" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="110" y="98" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">PROJECT DESCRIPTION</text>
  <text x="110" y="115" text-anchor="middle" fill="#64748b" font-size="9">"Build a Flask REST API"</text>

  <!-- Arrow right to backends -->
  <line x1="190" y1="103" x2="230" y2="103" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- BACKEND label -->
  <text x="237" y="74" fill="#64748b" font-size="10" font-weight="600" letter-spacing="1.2">BACKEND (--backend)</text>

  <!-- LangGraph -->
  <rect x="230" y="80" width="145" height="44" rx="8" fill="#0f2d1a" stroke="#16a34a" stroke-width="1.5"/>
  <text x="302" y="97" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="700">LangGraph</text>
  <text x="302" y="113" text-anchor="middle" fill="#86efac" font-size="9">StateGraph · streaming</text>

  <!-- CrewAI (demoted to comparison-only) -->
  <rect x="230" y="134" width="145" height="44" rx="8" fill="#1a1a2e" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.85"/>
  <text x="302" y="151" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="700">CrewAI</text>
  <text x="302" y="167" text-anchor="middle" fill="#c7d2fe" font-size="9">Flows · comparison-only</text>
  <rect x="338" y="128" width="56" height="14" rx="7" fill="#7f1d1d"/>
  <text x="366" y="138" text-anchor="middle" fill="#fca5a5" font-size="7.5" font-weight="700">DEMOTED</text>

  <!-- Claude SDK -->
  <rect x="230" y="188" width="145" height="44" rx="8" fill="#1a1207" stroke="#d97706" stroke-width="1.5"/>
  <text x="302" y="205" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700">Claude Agent SDK</text>
  <text x="302" y="221" text-anchor="middle" fill="#fde68a" font-size="9">Subagents · Anthropic API</text>

