  <line x1="603" y1="98" x2="616" y2="98" stroke="#334155" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- DEVELOPMENT -->
  <rect x="616" y="80" width="78" height="36" rx="6" fill="#1a1a2e" stroke="#6366f1" stroke-width="1.2"/>
  <text x="655" y="95" text-anchor="middle" fill="#a5b4fc" font-size="9.5" font-weight="700">DEV</text>
  <text x="655" y="109" text-anchor="middle" fill="#c7d2fe" font-size="8">Backend · FE · Full</text>
  <line x1="694" y1="98" x2="707" y2="98" stroke="#334155" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- TESTING -->
  <rect x="707" y="80" width="65" height="36" rx="6" fill="#1c1a0e" stroke="#ca8a04" stroke-width="1.2"/>
  <text x="739" y="95" text-anchor="middle" fill="#fbbf24" font-size="9.5" font-weight="700">TESTING</text>
  <text x="739" y="109" text-anchor="middle" fill="#fde68a" font-size="8">QA Engineer</text>
  <line x1="772" y1="98" x2="785" y2="98" stroke="#334155" stroke-width="1.2" marker-end="url(#arr)"/>

