    <rect x="280" y="354" width="112" height="40" rx="6" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="336" y="372" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Fullstack Dev</text>
    <text x="336" y="387" text-anchor="middle" font-size="10" fill="#6b7280">End-to-end</text>

    <rect x="40" y="402" width="112" height="40" rx="6" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="96" y="420" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">QA Engineer</text>
