  <text x="485" y="309" text-anchor="middle" fill="#86efac" font-size="8">blocks eval · rm-rf · os.system</text>

  <rect x="420" y="324" width="130" height="36" rx="6" fill="#0d0d1e" stroke="#6366f1" stroke-width="1.5"/>
  <text x="485" y="341" text-anchor="middle" fill="#a5b4fc" font-size="9.5" font-weight="700">Behavioral</text>
  <text x="485" y="355" text-anchor="middle" fill="#c7d2fe" font-size="8">role enforcement · scope control</text>

  <rect x="420" y="370" width="130" height="36" rx="6" fill="#1a130a" stroke="#d97706" stroke-width="1.5"/>
  <text x="485" y="387" text-anchor="middle" fill="#fbbf24" font-size="9.5" font-weight="700">Quality</text>
  <text x="485" y="401" text-anchor="middle" fill="#fde68a" font-size="8">coverage · complexity · docs</text>

