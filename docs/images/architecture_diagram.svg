  <line x1="796" y1="126" x2="808" y2="126" stroke="#9ca3af" stroke-width="1.2" marker-end="url(#a)"/>
  <rect x="808" y="106" width="52" height="40" rx="6" fill="#f3f4f6" stroke="#9ca3af"/>
  <text x="834" y="123" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Deploy</text>
  <text x="834" y="138" text-anchor="middle" font-size="10" fill="#6b7280">DevOps</text>

