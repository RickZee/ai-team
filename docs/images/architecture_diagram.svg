  <circle cx="632" cy="332" r="4" fill="#ef4444"/>
  <text x="646" y="336" font-size="11" font-weight="600" fill="#374151">Failure captured → SQLite</text>
  <line x1="632" y1="336" x2="632" y2="352" stroke="#9ca3af" stroke-width="1" stroke-dasharray="2 2" marker-end="url(#a)"/>
  <circle cx="632" cy="359" r="4" fill="#f97316"/>
  <text x="646" y="363" font-size="11" font-weight="600" fill="#374151">Pattern clustering</text>
  <line x1="632" y1="363" x2="632" y2="379" stroke="#9ca3af" stroke-width="1" stroke-dasharray="2 2" marker-end="url(#a)"/>
  <circle cx="632" cy="386" r="4" fill="#8b5cf6"/>
  <text x="646" y="390" font-size="11" font-weight="600" fill="#374151">Lessons extracted → SQLite</text>
  <line x1="632" y1="390" x2="632" y2="406" stroke="#9ca3af" stroke-width="1" stroke-dasharray="2 2" marker-end="url(#a)"/>
  <circle cx="632" cy="413" r="4" fill="#22c55e"/>
  <text x="646" y="417" font-size="11" font-weight="600" fill="#374151">Injected into prompts next run</text>

