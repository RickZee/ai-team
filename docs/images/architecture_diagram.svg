  <rect x="450" y="80" width="70" height="36" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.2"/>
  <text x="485" y="95" text-anchor="middle" fill="#94a3b8" font-size="9.5" font-weight="700">INTAKE</text>
  <text x="485" y="109" text-anchor="middle" fill="#64748b" font-size="8">Manager</text>
  <line x1="520" y1="98" x2="533" y2="98" stroke="#334155" stroke-width="1.2" marker-end="url(#arr)"/>

