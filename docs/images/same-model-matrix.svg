<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="Helvetica, Arial, sans-serif">
  <rect width="1200" height="640" fill="#ffffff"/>

  <!-- Title -->
  <text x="60" y="56" font-size="30" font-weight="700" fill="#111827">Was it the framework — or the model?</text>
  <text x="60" y="86" font-size="16" fill="#6b7280">Same framework (LangGraph), same brief, same guardrails. Only the model changed.</text>

  <!-- ===== Left panel: deepseek ===== -->
  <g>
    <rect x="60" y="120" width="520" height="380" rx="12" fill="#fafafa" stroke="#e5e7eb" stroke-width="1.5"/>
    <text x="90" y="162" font-size="20" font-weight="700" fill="#374151">deepseek-v3</text>
    <text x="90" y="186" font-size="13" fill="#6b7280">LangGraph default · 3 runs</text>

    <!-- QA behavior quote -->
    <rect x="90" y="206" width="460" height="74" rx="8" fill="#fff7ed" stroke="#fdba74"/>
    <text x="108" y="234" font-size="14" fill="#9a3412" font-style="italic">“I will now proceed to write the test files…”</text>
    <text x="108" y="256" font-size="13" fill="#c2410c">narrates instead of calling file_writer — every run</text>

    <!-- Run boxes -->
    <g font-size="14" font-weight="600">
      <rect x="90" y="304" width="140" height="96" rx="8" fill="#fee2e2" stroke="#ef4444"/>
      <text x="160" y="342" text-anchor="middle" fill="#991b1b">Run 1</text>
      <text x="160" y="368" text-anchor="middle" font-size="22" fill="#dc2626">0</text>
      <text x="160" y="388" text-anchor="middle" font-size="11.5" font-weight="400" fill="#b91c1c">test files</text>

      <rect x="250" y="304" width="140" height="96" rx="8" fill="#fee2e2" stroke="#ef4444"/>
      <text x="320" y="342" text-anchor="middle" fill="#991b1b">Run 2</text>
      <text x="320" y="368" text-anchor="middle" font-size="22" fill="#dc2626">0</text>
      <text x="320" y="388" text-anchor="middle" font-size="11.5" font-weight="400" fill="#b91c1c">test files</text>

      <rect x="410" y="304" width="140" height="96" rx="8" fill="#fee2e2" stroke="#ef4444"/>
      <text x="480" y="342" text-anchor="middle" fill="#991b1b">Run 3</text>
      <text x="480" y="368" text-anchor="middle" font-size="22" fill="#dc2626">0</text>
      <text x="480" y="388" text-anchor="middle" font-size="11.5" font-weight="400" fill="#b91c1c">test files</text>
    </g>

    <text x="90" y="446" font-size="15" font-weight="700" fill="#991b1b">3/3 runs escalated to human review</text>
    <text x="90" y="470" font-size="13" fill="#6b7280">tests/ directory empty every time</text>
  </g>

  <!-- ===== Right panel: claude ===== -->
  <g>
    <rect x="620" y="120" width="520" height="380" rx="12" fill="#fafafa" stroke="#e5e7eb" stroke-width="1.5"/>
    <text x="650" y="162" font-size="20" font-weight="700" fill="#374151">claude-sonnet-4</text>
    <text x="650" y="186" font-size="13" fill="#6b7280">all 9 roles pinned via model_overrides · 4 runs</text>

    <rect x="650" y="206" width="460" height="74" rx="8" fill="#f0fdf4" stroke="#86efac"/>
    <text x="668" y="234" font-size="14" fill="#166534" font-family="Menlo, Consolas, monospace">file_writer(path='tests/conftest.py', …)</text>
    <text x="668" y="256" font-size="13" fill="#15803d">calls the tool and writes real suites — every run</text>

    <g font-size="14" font-weight="600">
      <rect x="650" y="304" width="105" height="96" rx="8" fill="#dcfce7" stroke="#22c55e"/>
      <text x="702" y="336" text-anchor="middle" fill="#166534">Run 1</text>
      <text x="702" y="362" text-anchor="middle" font-size="22" fill="#16a34a">10</text>
      <text x="702" y="382" text-anchor="middle" font-size="11" font-weight="400" fill="#15803d">test files</text>

      <rect x="769" y="304" width="105" height="96" rx="8" fill="#dcfce7" stroke="#22c55e"/>
      <text x="821" y="336" text-anchor="middle" fill="#166534">Run 2</text>
      <text x="821" y="362" text-anchor="middle" font-size="22" fill="#16a34a">✓</text>
      <text x="821" y="382" text-anchor="middle" font-size="11" font-weight="400" fill="#15803d">2 test cycles</text>

      <rect x="888" y="304" width="105" height="96" rx="8" fill="#dcfce7" stroke="#22c55e"/>
      <text x="940" y="336" text-anchor="middle" fill="#166534">Run 3</text>
      <text x="940" y="362" text-anchor="middle" font-size="22" fill="#16a34a">4</text>
      <text x="940" y="382" text-anchor="middle" font-size="11" font-weight="400" fill="#15803d">suites + conftest</text>

      <rect x="1007" y="304" width="105" height="96" rx="8" fill="#dcfce7" stroke="#22c55e"/>
      <text x="1059" y="336" text-anchor="middle" fill="#166534">Run 4</text>
      <text x="1059" y="362" text-anchor="middle" font-size="22" fill="#16a34a">✓</text>
      <text x="1059" y="382" text-anchor="middle" font-size="11" font-weight="400" fill="#15803d">suites + conftest</text>
    </g>

    <text x="650" y="446" font-size="15" font-weight="700" fill="#166534">4/4 runs wrote working test code</text>
    <text x="650" y="470" font-size="13" fill="#6b7280">remaining blockers: budget ceiling, provider routing, gate env — not the model</text>
  </g>

  <!-- Bottom verdict -->
  <rect x="60" y="530" width="1080" height="72" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="600" y="560" text-anchor="middle" font-size="17" font-weight="700" fill="#3730a3">Verdict: the “framework failure” was a model property all along.</text>
  <text x="600" y="586" text-anchor="middle" font-size="14" fill="#4338ca">With the model held constant, failures move up the stack — provider routing, budget calibration, gate-environment fidelity.</text>
</svg>
