<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="400" fill="#ffffff"/>

  <text x="40" y="42" font-size="24" font-weight="700" fill="#111827">Inter-agent communication — three backends</text>
  <text x="40" y="68" font-size="14" fill="#6b7280">Same phases; each moves work manager → specialists → shared state differently</text>

  <!-- CrewAI -->
  <rect x="40" y="96" width="260" height="284" rx="10" fill="none" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="170" y="124" text-anchor="middle" font-size="17" font-weight="700" fill="#5b21b6">CrewAI</text>
  <text x="170" y="146" text-anchor="middle" font-size="13" fill="#7c3aed">typed state object</text>
  <rect x="80" y="164" width="180" height="52" rx="8" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="170" y="188" text-anchor="middle" font-size="15" font-weight="600" fill="#4c1d95">Manager</text>
  <text x="170" y="206" text-anchor="middle" font-size="12.5" fill="#7c3aed">manager_agent</text>
  <rect x="80" y="252" width="180" height="52" rx="8" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="170" y="276" text-anchor="middle" font-size="15" font-weight="600" fill="#4c1d95">Specialists</text>
  <text x="170" y="294" text-anchor="middle" font-size="12.5" fill="#7c3aed">PO, architect, devs</text>
  <rect x="80" y="322" width="180" height="46" rx="8" fill="#f3f4f6" stroke="#9ca3af"/>
  <text x="170" y="344" text-anchor="middle" font-size="15" font-weight="600" fill="#374151">ProjectState</text>
  <text x="170" y="360" text-anchor="middle" font-size="12" fill="#6b7280">typed Pydantic docs</text>
  <line x1="170" y1="216" x2="170" y2="250" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="170" y1="304" x2="170" y2="320" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- LangGraph -->
  <rect x="320" y="96" width="260" height="284" rx="10" fill="none" stroke="#14b8a6" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="450" y="124" text-anchor="middle" font-size="17" font-weight="700" fill="#0f766e">LangGraph</text>
  <text x="450" y="146" text-anchor="middle" font-size="13" fill="#0d9488">shared graph channels</text>
  <rect x="360" y="164" width="180" height="52" rx="8" fill="#ccfbf1" stroke="#14b8a6"/>
  <text x="450" y="188" text-anchor="middle" font-size="15" font-weight="600" fill="#134e4a">Supervisor</text>
  <text x="450" y="206" text-anchor="middle" font-size="12.5" fill="#0d9488">manager LLM</text>
  <rect x="360" y="252" width="180" height="52" rx="8" fill="#ccfbf1" stroke="#14b8a6"/>
  <text x="450" y="276" text-anchor="middle" font-size="15" font-weight="600" fill="#134e4a">Worker agents</text>
  <text x="450" y="294" text-anchor="middle" font-size="12.5" fill="#0d9488">ReAct</text>
  <rect x="360" y="322" width="180" height="46" rx="8" fill="#f3f4f6" stroke="#9ca3af"/>
  <text x="450" y="344" text-anchor="middle" font-size="15" font-weight="600" fill="#374151">Graph state</text>
  <text x="450" y="360" text-anchor="middle" font-size="12" fill="#6b7280">TypedDict channels</text>
  <line x1="450" y1="216" x2="450" y2="250" stroke="#14b8a6" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="450" y1="304" x2="450" y2="320" stroke="#14b8a6" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- SDK -->
  <rect x="600" y="96" width="260" height="284" rx="10" fill="none" stroke="#f97316" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="730" y="124" text-anchor="middle" font-size="17" font-weight="700" fill="#9a3412">Claude Agent SDK</text>
  <text x="730" y="146" text-anchor="middle" font-size="13" fill="#c2410c">session + files</text>
  <rect x="640" y="164" width="180" height="52" rx="8" fill="#ffedd5" stroke="#f97316"/>
  <text x="730" y="188" text-anchor="middle" font-size="15" font-weight="600" fill="#7c2d12">Orchestrator</text>
  <text x="730" y="206" text-anchor="middle" font-size="12.5" fill="#c2410c">system prompt</text>
  <rect x="640" y="252" width="180" height="52" rx="8" fill="#ffedd5" stroke="#f97316"/>
  <text x="730" y="276" text-anchor="middle" font-size="15" font-weight="600" fill="#7c2d12">Subagents</text>
  <text x="730" y="294" text-anchor="middle" font-size="12.5" fill="#c2410c">Agent tool</text>
  <rect x="640" y="322" width="180" height="46" rx="8" fill="#f3f4f6" stroke="#9ca3af"/>
  <text x="730" y="344" text-anchor="middle" font-size="15" font-weight="600" fill="#374151">Workspace files</text>
  <text x="730" y="360" text-anchor="middle" font-size="12" fill="#6b7280">docs / src / tests</text>
  <line x1="730" y1="216" x2="730" y2="250" stroke="#f97316" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="730" y1="304" x2="730" y2="320" stroke="#f97316" stroke-width="1.5" marker-end="url(#a)"/>

  <defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
</svg>
