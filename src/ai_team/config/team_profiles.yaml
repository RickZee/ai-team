# Use-case team profiles: which agents and phases participate (shared by CrewAI and LangGraph).
# Agent keys must match top-level keys in config/agents.yaml.

profiles:
  full:
    agents:
      - manager
      - product_owner
      - architect
      - backend_developer
      - frontend_developer
      - fullstack_developer
      - devops_engineer
      - cloud_engineer
      - qa_engineer
    phases: [intake, planning, development, testing, deployment]
    # Phase 6: optional RAG scoping (metadata; LangGraph/CrewAI read via profile.metadata["rag"])
    rag:
      knowledge_topics: [python, security, testing, api, devops]
      include_markdown_sources: true

  # Same-model matrix: every role pinned to Claude Sonnet 4.6 via OpenRouter so
  # framework-vs-framework comparisons (e.g. langgraph vs claude-agent-sdk) hold
  # the model constant. See docs/MODELS.md.
  full-claude:
    agents:
      - manager
      - product_owner
      - architect
      - backend_developer
      - frontend_developer
      - fullstack_developer
      - devops_engineer
      - cloud_engineer
      - qa_engineer
    phases: [intake, planning, development, testing, deployment]
    model_overrides:
      manager: openrouter/anthropic/claude-sonnet-4.6
      product_owner: openrouter/anthropic/claude-sonnet-4.6
      architect: openrouter/anthropic/claude-sonnet-4.6
      backend_developer: openrouter/anthropic/claude-sonnet-4.6
      frontend_developer: openrouter/anthropic/claude-sonnet-4.6
      fullstack_developer: openrouter/anthropic/claude-sonnet-4.6
      devops_engineer: openrouter/anthropic/claude-sonnet-4.6
      cloud_engineer: openrouter/anthropic/claude-sonnet-4.6
      qa_engineer: openrouter/anthropic/claude-sonnet-4.6

  backend-api:
    agents:
      - manager
      - product_owner
      - architect
      - backend_developer
      - qa_engineer
      - devops_engineer
    phases: [intake, planning, development, testing, deployment]

  frontend-app:
    agents:
      - manager
      - product_owner
      - architect
      - frontend_developer
      - qa_engineer
      - devops_engineer
    phases: [intake, planning, development, testing, deployment]

  data-pipeline:
    agents:
      - manager
      - product_owner
      - architect
      - backend_developer
      - qa_engineer
    phases: [intake, planning, development, testing]

  prototype:
    agents:
      - architect
      - fullstack_developer
      - qa_engineer
    phases: [intake, planning, development, testing]

  smoke:
    # Minimal smoke test: plan → code → test. No deployment.
    # Use for CI smoke checks and end-to-end pipeline validation.
    agents:
      - architect
      - backend_developer
      - qa_engineer
    phases: [planning, development, testing]
    min_coverage_pct: 0          # no coverage gate for smoke
    max_complexity: simple
    phase_timeouts_seconds:
      planning: 180
      development: 300
      testing: 300

  smoke-claude:
    # Same roster/phases as `smoke`, but every role pinned to the same Claude
    # model. This is the SAME-MODEL control for backend comparison: with the
    # model held constant, a difference between backends is a framework
    # difference, not a model difference. Verdicts published as "framework X vs
    # framework Y" must come from this profile (or full-claude), not from the
    # default mixed-model profiles where CrewAI/LangGraph run deepseek and the
    # SDK runs Claude.
    #
    # CAVEAT: the claude-agent-sdk backend talks to the Anthropic API directly
    # and does NOT read these OpenRouter `model_overrides`. It is same-model
    # only if its own config points at the matching Claude model. For CrewAI vs
    # LangGraph the control is exact; for anything involving the SDK, confirm the
    # SDK model matches before treating the comparison as model-controlled.
    agents:
      - architect
      - backend_developer
      - qa_engineer
    phases: [planning, development, testing]
    min_coverage_pct: 0
    max_complexity: simple
    phase_timeouts_seconds:
      planning: 180
      development: 300
      testing: 300
    model_overrides:
      architect: openrouter/anthropic/claude-sonnet-4.6
      backend_developer: openrouter/anthropic/claude-sonnet-4.6
      qa_engineer: openrouter/anthropic/claude-sonnet-4.6

  infra-only:
    agents:
      - architect
      - devops_engineer
      - cloud_engineer
    phases: [intake, planning, deployment]

