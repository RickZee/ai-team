# Use-case team profiles: which agents and phases participate (shared by CrewAI and LangGraph).
# Agent keys must match top-level keys in config/agents.yaml.

profiles:
  full:
    agents:
      - manager
      - product_owner
      - architect
      - backend_developer
      - frontend_developer
      - fullstack_developer
      - devops_engineer
      - cloud_engineer
      - qa_engineer
    phases: [intake, planning, development, testing, deployment]
    # Phase 6: optional RAG scoping (metadata; LangGraph/CrewAI read via profile.metadata["rag"])
    rag:
      knowledge_topics: [python, security, testing, api, devops]
      include_markdown_sources: true

  # Same-model matrix config (SHOWCASE_PLAN / comparison confound): the "full"
  # team with every role pinned to the same Claude model the SDK backend uses,
  # via OpenRouter. Lets langgraph run framework-vs-framework against
  # claude-agent-sdk with the model held constant.
  full-claude:
    agents:
      - manager
      - product_owner
      - architect
      - backend_developer
      - frontend_developer
      - fullstack_developer
      - devops_engineer
      - cloud_engineer
      - qa_engineer
    phases: [intake, planning, development, testing, deployment]
    model_overrides:
      manager: openrouter/anthropic/claude-sonnet-4
      product_owner: openrouter/anthropic/claude-sonnet-4
      architect: openrouter/anthropic/claude-sonnet-4
      backend_developer: openrouter/anthropic/claude-sonnet-4
      frontend_developer: openrouter/anthropic/claude-sonnet-4
      fullstack_developer: openrouter/anthropic/claude-sonnet-4
      devops_engineer: openrouter/anthropic/claude-sonnet-4
      cloud_engineer: openrouter/anthropic/claude-sonnet-4
      qa_engineer: openrouter/anthropic/claude-sonnet-4

  backend-api:
    agents:
      - manager
      - product_owner
      - architect
      - backend_developer
      - qa_engineer
      - devops_engineer
    phases: [intake, planning, development, testing, deployment]

  frontend-app:
    agents:
      - manager
      - product_owner
      - architect
      - frontend_developer
      - qa_engineer
      - devops_engineer
    phases: [intake, planning, development, testing, deployment]

  data-pipeline:
    agents:
      - manager
      - product_owner
      - architect
      - backend_developer
      - qa_engineer
    phases: [intake, planning, development, testing]

  prototype:
    agents:
      - architect
      - fullstack_developer
      - qa_engineer
    phases: [intake, planning, development, testing]

  smoke:
    # Minimal smoke test: plan → code → test. No deployment.
    # Use for CI smoke checks and end-to-end pipeline validation.
    agents:
      - architect
      - backend_developer
      - qa_engineer
    phases: [planning, development, testing]
    min_coverage_pct: 0          # no coverage gate for smoke
    max_complexity: simple
    phase_timeouts_seconds:
      planning: 180
      development: 300
      testing: 300

  infra-only:
    agents:
      - architect
      - devops_engineer
      - cloud_engineer
    phases: [intake, planning, deployment]

